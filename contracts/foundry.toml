# Foundry configuration for LegacyVault (YourLegacy Phase 1)
# Local test only until lawyer consult clears non-custodial framing.
# NO mainnet RPC. NO broadcast keys. Sepolia config sits here ready, unused.

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./"}]

# Fuzz + invariant defaults — bumped from 256 default for higher confidence.
[fuzz]
runs = 1000
max_test_rejects = 65536

[invariant]
runs = 256
depth = 25
fail_on_revert = false

# RPC endpoints — Base Sepolia only.
# DO NOT broadcast until lawyer consult (9am Central 2026-05-26) clears the
# non-custodial framing. forge test --rpc-url $BASE_SEPOLIA stays local-only.
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
# base_mainnet = INTENTIONALLY OMITTED until Phase 4 audit complete.

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
